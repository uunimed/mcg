<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>გადამისამართება</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-align: center;
        }
        
        .container {
            background: rgba(255, 255, 255, 0.1);
            padding: 2rem;
            border-radius: 15px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }
        
        h1 {
            font-size: 2.5rem;
            margin-bottom: 1rem;
        }
        
        p {
            font-size: 1.2rem;
            margin-bottom: 0.5rem;
        }
        
        .timer {
            font-size: 3rem;
            font-weight: bold;
            margin: 1rem 0;
            color: #ffd700;
        }
        
        .link-container {
            margin-top: 2rem;
            padding: 1rem;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
        }
        
        a {
            color: #ffd700;
            text-decoration: none;
            font-weight: bold;
            word-break: break-all;
        }
        
        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔄 გადამისამართება</h1>
        <p>თქვენ გადამისამართდებით 3 წამში:</p>
        <div class="timer" id="timer">3</div>
        
        <div class="link-container">
            <p>📌 ახალი ლინკი:</p>
            <a href="http://uunimed.github.io/exams" target="_blank" rel="noopener noreferrer">
                http://uunimed.github.io/exams
            </a>
        </div>
    </div>

    <script>
        // დათვლის ტაიმერი
        let seconds = 3;
        const timerElement = document.getElementById('timer');
        
        // განაახლებს ტაიმერს ყოველ წამში
        const countdown = setInterval(() => {
            seconds--;
            timerElement.textContent = seconds;
            
            if (seconds <= 0) {
                clearInterval(countdown);
                // გადამისამართება მთავარ გვერდზე
                window.location.href = 'http://uunimed.github.io/exams';
                // ახალი ლინკის გახსნა ახალ ტაბში
                window.open('http://uunimed.github.io/exams', '_blank');
            }
        }, 1000);
        
        // დამატებითი უსაფრთხოება: თუ რამე მოხდა ტაიმერთან
        setTimeout(() => {
            if (seconds > 0) {
                window.location.href = 'http://uunimed.github.io/exams';
                window.open('http://uunimed.github.io/exams', '_blank');
            }
        }, 3500); // 3.5 წამი როგორც ბექაფი
    </script>
</body>
</html>
