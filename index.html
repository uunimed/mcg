<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF--8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uhr</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            background-color: #03050c; /* rich dark base */
            /* soft, fat, modern Georgian-friendly font stack */
            font-family: 'Segoe UI', 'Roboto', 'Noto Sans Georgian', 'Noto Sans', system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
            font-weight: 700;
        }

        /* Canvas sits behind everything, fills screen */
        #universe-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: block;
            z-index: 0;
            pointer-events: none;
        }

        /* clock container: full flex center, layered above canvas */
        .clock-wrapper {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
            color: white;
            text-shadow: 0 0 25px rgba(255, 255, 240, 0.3), 0 0 50px rgba(180, 200, 255, 0.15);
            padding: 1rem;
        }

        /* clock panel: absolutely no background, just text */
        .clock-panel {
            text-align: center;
            background: transparent;
            backdrop-filter: none;
            -webkit-backdrop-filter: none;
            border: none;
            box-shadow: none;
            padding: 0;
            max-width: 95vw;
        }

        /* time in bold, soft and fat — no neon */
        .time {
            font-size: clamp(5rem, 22vw, 13rem);
            font-weight: 800;
            letter-spacing: 2px;
            line-height: 1.1;
            font-variant-numeric: tabular-nums;
            color: #ffffff;
            text-shadow: 0 0 30px rgba(255, 240, 200, 0.25); 
            margin: 0;
        }

        /* date row: month + year, bold but slightly lighter */
        .date {
            font-size: clamp(2.2rem, 7vw, 4.2rem);
            font-weight: 700;
            letter-spacing: 2px;
            margin-top: 0.6rem;
            color: #f0f4ff;
            text-shadow: 0 0 25px rgba(220, 230, 255, 0.25);
            line-height: 1.3;
            border: none;
            padding: 0;
            display: block;
        }

        /* small subtitle — light contrast */
        .clock-panel sub {
            font-size: 1.2rem;
            font-weight: 400;
            opacity: 0.75;
            display: block;
            margin-top: 1.4rem;
            letter-spacing: 2px;
            color: #d0d8ff;
            text-shadow: 0 0 15px rgba(150, 170, 250, 0.2);
            background: transparent;
        }

        /* all text elements have zero background */
        .time, .date, sub {
            background: transparent;
        }

        /* responsive adjustments */
        @media (max-width: 600px) {
            .time {
                font-size: clamp(4rem, 18vw, 8rem);
                letter-spacing: 1px;
            }
            .date {
                font-size: clamp(1.8rem, 6vw, 3rem);
                margin-top: 0.4rem;
            }
        }
    </style>
</head>
<body>
    <!-- canvas for UNIVERSE: moving particles + meteors + twinkling stars -->
    <canvas id="universe-canvas"></canvas>

    <!-- clock overlay, centered, completely transparent background -->
    <div class="clock-wrapper">
        <div class="clock-panel">
            <!-- time in hh.mm.ss -->
            <div class="time" id="time">23.59.59</div>
            <!-- month year in Georgian: e.g. "მარტი 2026" -->
            <div class="date" id="date">მარტი 2026</div>
            <sub>თბილისის დროით</sub>
        </div>
    </div>

    <script>
        (function() {
            "use strict";

            // ---------- THREE LAYER BACKGROUND: MOVING PARTICLES + TWINKLING STARS + METEORS ----------
            const canvas = document.getElementById('universe-canvas');
            const ctx = canvas.getContext('2d');

            let width, height;
            
            // --- PARTICLE SYSTEM (moving randomly, like old html) ---
            let particles = [];
            const PARTICLE_COUNT = 120;
            
            // --- STAR LAYER (with strong twinkling) ---
            let stars = [];
            const STAR_COUNT = 350;
            
            // --- METEOR LAYER (periodic shooting stars) ---
            let meteors = [];
            const METEOR_COUNT = 3; // we'll keep a small pool and activate randomly
            const METEOR_SPEED_BASE = 6;
            
            // --- initialize all systems ---
            function initUniverse() {
                // particles (moving randomly)
                particles = [];
                for (let i = 0; i < PARTICLE_COUNT; i++) {
                    particles.push({
                        x: Math.random() * width,
                        y: Math.random() * height,
                        vx: (Math.random() - 0.5) * 0.5,
                        vy: (Math.random() - 0.5) * 0.4,
                        radius: Math.random() * 2.2 + 0.8,
                        baseAlpha: Math.random() * 0.5 + 0.3,
                    });
                }
                
                // stars (with stronger twinkling range)
                stars = [];
                for (let i = 0; i < STAR_COUNT; i++) {
                    stars.push({
                        x: Math.random() * width,
                        y: Math.random() * height,
                        radius: Math.random() * 2.5 + 0.7,
                        baseBrightness: Math.random() * 0.5 + 0.2, // 0.2-0.7 (darker base allows more twinkle)
                        twinklePhase: Math.random() * Math.PI * 2,
                        twinkleRate: Math.random() * 0.03 + 0.01,  // 0.01-0.04
                        twinkleAmplitude: Math.random() * 0.5 + 0.3, // 0.3-0.8 amplitude -> strong twinkling
                    });
                }
                
                // meteors: pre-create but set active = false
                meteors = [];
                for (let i = 0; i < METEOR_COUNT; i++) {
                    meteors.push({
                        active: false,
                        x: 0, y: 0,
                        length: 70,
                        speed: 0,
                        angle: 0, // direction in radians
                        dx: 0, dy: 0,
                        life: 1.0,
                    });
                }
            }

            function resizeCanvas() {
                width = window.innerWidth;
                height = window.innerHeight;
                canvas.width = width;
                canvas.height = height;
                initUniverse();
            }

            // --- update particles (random motion) ---
            function updateParticles() {
                for (let p of particles) {
                    p.x += p.vx;
                    p.y += p.vy;

                    // wrap around edges
                    if (p.x < 0) p.x = width;
                    if (p.x > width) p.x = 0;
                    if (p.y < 0) p.y = height;
                    if (p.y > height) p.y = 0;

                    // occasional gentle drift
                    if (Math.random() < 0.005) {
                        p.vx += (Math.random() - 0.5) * 0.06;
                        p.vy += (Math.random() - 0.5) * 0.06;
                        const maxSpeed = 0.6;
                        if (Math.abs(p.vx) > maxSpeed) p.vx *= 0.96;
                        if (Math.abs(p.vy) > maxSpeed) p.vy *= 0.96;
                    }
                }
            }

            // --- update stars: they don't move, just twinkle (handled in draw with time) ---
            // (stars remain static to emphasize meteor motion)
            
            // --- update meteors: activate and move ---
            function updateMeteors(now) {
                // chance to spawn a new meteor (approx every 3 seconds)
                if (Math.random() < 0.005) { // 0.5% per frame ~ 3 per second at 60fps, but limited by pool
                    for (let m of meteors) {
                        if (!m.active) {
                            // activate this meteor
                            m.active = true;
                            // start from random top edge (x from 0 to width, y near top)
                            m.x = Math.random() * width;
                            m.y = Math.random() * height * 0.2; // top 20%
                            // angle: mostly downward and slightly random sideways (meteor effect)
                            m.angle = (Math.random() * 0.8 + 0.2) * Math.PI; // between ~0.2pi and 1.0pi (downward-ish)
                            // direction vector
                            m.dx = Math.sin(m.angle) * METEOR_SPEED_BASE * (Math.random() * 0.7 + 0.7);
                            m.dy = Math.cos(m.angle) * METEOR_SPEED_BASE * (Math.random() * 0.7 + 0.7);
                            m.length = Math.random() * 50 + 50; // 50-100
                            m.life = 1.0; // full brightness
                            break; // only spawn one per frame
                        }
                    }
                }
                
                // update active meteors
                for (let m of meteors) {
                    if (m.active) {
                        m.x += m.dx;
                        m.y += m.dy;
                        
                        // fade out gradually
                        m.life -= 0.008;
                        
                        // deactivate if off screen or faded
                        if (m.y > height + 50 || m.x < -50 || m.x > width + 50 || m.life <= 0.02) {
                            m.active = false;
                        }
                    }
                }
            }

            // --- draw everything with strong twinkling stars, particles, and meteors ---
            function drawUniverse(now) {
                if (!ctx || width === 0 || height === 0) return;

                // Deep space gradient background
                const gradient = ctx.createLinearGradient(0, 0, width*0.4, height);
                gradient.addColorStop(0, '#040614');
                gradient.addColorStop(0.7, '#121c30');
                ctx.fillStyle = gradient;
                ctx.fillRect(0, 0, width, height);

                // ---- 1. Draw moving particles (random motion, subtle connections) ----
                // faint connections between particles
                ctx.strokeStyle = 'rgba(100, 160, 250, 0.08)';
                ctx.lineWidth = 0.6;
                for (let i = 0; i < particles.length; i++) {
                    for (let j = i + 1; j < particles.length; j++) {
                        const dx = particles[i].x - particles[j].x;
                        const dy = particles[i].y - particles[j].y;
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        if (dist < 120) {
                            const op = 0.1 * (1 - dist / 120);
                            ctx.strokeStyle = `rgba(140, 190, 255, ${op})`;
                            ctx.beginPath();
                            ctx.moveTo(particles[i].x, particles[i].y);
                            ctx.lineTo(particles[j].x, particles[j].y);
                            ctx.stroke();
                        }
                    }
                }

                // draw particles themselves
                for (let p of particles) {
                    const grd = ctx.createRadialGradient(p.x, p.y, 0.3, p.x, p.y, p.radius * 3);
                    grd.addColorStop(0, `rgba(255, 255, 255, ${p.baseAlpha + 0.2})`);
                    grd.addColorStop(0.6, `rgba(160, 200, 255, ${p.baseAlpha * 0.7})`);
                    grd.addColorStop(1, `rgba(80, 120, 230, 0)`);

                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.radius * 2.0, 0, Math.PI * 2);
                    ctx.fillStyle = grd;
                    ctx.fill();

                    // tiny core
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.radius * 0.9, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(255, 255, 255, 0.9)`;
                    ctx.fill();
                }

                // ---- 2. Draw stars with STRONG TWINKLING (periodic brightness change) ----
                for (let s of stars) {
                    // strong twinkling using sine wave with amplitude
                    const twinkle = Math.sin(now * s.twinkleRate + s.twinklePhase) * s.twinkleAmplitude;
                    let brightness = s.baseBrightness + twinkle;
                    brightness = Math.min(0.98, Math.max(0.15, brightness)); // keep visible, but allow dimming
                    
                    // color: white with slight variation
                    const r = 255;
                    const g = 240 + Math.floor(15 * brightness);
                    const b = 255;

                    // glowing star (soft)
                    const grdStar = ctx.createRadialGradient(s.x, s.y, 0.1, s.x, s.y, s.radius * 2.8);
                    grdStar.addColorStop(0, `rgba(${r}, ${g}, ${b}, ${brightness})`);
                    grdStar.addColorStop(0.5, `rgba(200, 215, 255, ${brightness * 0.5})`);
                    grdStar.addColorStop(1, `rgba(140, 160, 240, 0)`);

                    ctx.beginPath();
                    ctx.arc(s.x, s.y, s.radius * 1.8, 0, Math.PI * 2);
                    ctx.fillStyle = grdStar;
                    ctx.fill();

                    // tiny bright core (twinkles too)
                    ctx.beginPath();
                    ctx.arc(s.x, s.y, s.radius * 0.7, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(255, 255, 255, ${brightness * 0.9})`;
                    ctx.fill();
                }

                // ---- 3. Draw meteors (shooting stars) ----
                for (let m of meteors) {
                    if (m.active) {
                        // meteor head
                        ctx.beginPath();
                        ctx.arc(m.x, m.y, 2.5 * m.life, 0, 2 * Math.PI);
                        ctx.fillStyle = `rgba(255, 255, 230, ${m.life})`;
                        ctx.fill();
                        
                        // tail
                        ctx.beginPath();
                        ctx.moveTo(m.x, m.y);
                        ctx.lineTo(m.x - m.dx * 0.8 * m.length, m.y - m.dy * 0.8 * m.length);
                        ctx.strokeStyle = `rgba(255, 240, 200, ${m.life * 0.7})`;
                        ctx.lineWidth = 2.0 * m.life;
                        ctx.stroke();
                        
                        // additional glow
                        ctx.beginPath();
                        ctx.arc(m.x, m.y, 5 * m.life, 0, 2 * Math.PI);
                        ctx.fillStyle = `rgba(255, 220, 150, ${m.life * 0.3})`;
                        ctx.fill();
                    }
                }
            }

            // animation loop
            function animateUniverse() {
                if (width !== window.innerWidth || height !== window.innerHeight) {
                    resizeCanvas();
                }

                // update layers
                updateParticles();   // moving particles
                // stars don't need position update (static)
                updateMeteors(performance.now()); // meteors

                // draw everything with current timestamp for twinkling
                drawUniverse(performance.now() / 20);  // pass time factor for sine

                requestAnimationFrame(animateUniverse);
            }

            // start the universe
            resizeCanvas();
            animateUniverse();

            // ---------- ADVANCED CLOCK with Georgian month names (clean, no neon) ----------
            const timeEl = document.getElementById('time');
            const dateEl = document.getElementById('date');

            // full Georgian month names
            const monthNamesGE = [
                'იანვარი', 'თებერვალი', 'მარტი', 'აპრილი', 'მაისი', 'ივნისი',
                'ივლისი', 'აგვისტო', 'სექტემბერი', 'ოქტომბერი', 'ნოემბერი', 'დეკემბერი'
            ];

            function updateClock() {
                const now = new Date();

                // time in hh.mm.ss (24h format, with dots)
                const hours = String(now.getHours()).padStart(2, '0');
                const minutes = String(now.getMinutes()).padStart(2, '0');
                const seconds = String(now.getSeconds()).padStart(2, '0');
                const timeString = `${hours}.${minutes}.${seconds}`;

                // month and year (down month, year) in Georgian: only month + year
                const monthIndex = now.getMonth();
                const monthName = monthNamesGE[monthIndex];
                const year = now.getFullYear();
                const dateString = `${monthName} ${year}`;

                // update DOM
                timeEl.textContent = timeString;
                dateEl.textContent = dateString;
            }

            updateClock();
            setInterval(updateClock, 500);
        })();
    </script>
</body>
</html>
