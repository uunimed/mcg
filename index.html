<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>UniMed | გადამისამართება</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+GO:wght@300;400;700&display=swap');

        :root {
            --accent-color: #3498db;
            --text-main: #2c3e50;
            --bg-color: #f8faff;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Parara', 'Fira GO', sans-serif; 
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #particle-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .card {
            position: relative;
            z-index: 2;
            width: 90%;
            max-width: 600px; 
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 3rem 2rem;
            border-radius: 40px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.08);
            border: 1px solid rgba(255,255,255,0.4);
            text-align: center;
            animation: cardEntrance 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
            transition: all 0.3s ease;
        }

        h1 {
            font-size: clamp(1.8rem, 5vw, 2.8rem);
            color: var(--accent-color);
            margin: 0 0 1.5rem 0;
            font-weight: 700;
        }

        .description {
            font-size: clamp(0.95rem, 2vw, 1.2rem);
            line-height: 1.6;
            color: var(--text-main);
            margin-bottom: 2rem;
            font-weight: 300;
            padding: 0 10px;
        }

        .redirect-box {
            background: rgba(255, 255, 255, 0.6);
            border-radius: 25px;
            padding: 1.5rem;
            margin-bottom: 2rem;
            border: 1px solid rgba(0,0,0,0.03);
        }

        .status-text {
            font-size: clamp(0.85rem, 1.5vw, 1rem);
            color: #7f8c8d;
            margin-bottom: 10px;
        }

        .timer-val {
            font-weight: bold;
            font-size: clamp(1.1rem, 2vw, 1.5rem);
            color: var(--accent-color);
        }

        .progress-container {
            height: 8px;
            background: #eee;
            border-radius: 10px;
            overflow: hidden;
            margin: 15px 0;
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #3498db, #5dade2);
            transition: width 1s linear;
        }

        .link-text {
            display: block;
            font-size: clamp(0.75rem, 1.2vw, 0.9rem);
            color: var(--accent-color);
            text-decoration: none;
            word-break: break-all;
            margin-top: 12px;
            opacity: 0.7;
            transition: opacity 0.3s;
        }

        .link-text:hover {
            opacity: 1;
        }

        footer {
            font-weight: 400;
            color: #95a5a6;
            font-size: clamp(0.9rem, 1.5vw, 1.1rem);
        }

        @keyframes cardEntrance {
            from { opacity: 0; transform: translateY(40px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        @media (min-width: 768px) {
            .card {
                padding: 4rem 3.5rem;
            }
        }
    </style>
</head>
<body>

    <canvas id="particle-canvas"></canvas>

    <div class="card">
        <h1>UniMed</h1>
        <p class="description">
            გვერდი განახლდა! რეზიდენტურის გამოცდის გარდა, დაემატა სალიცენზიო გამოცდები და ფუნქციები, რომლებიც ნამდვილად გჭირდებათ!
        </p>

        <div class="redirect-box">
            <div class="status-text">მიმდინარეობს გადამისამართება...</div>
            <div class="timer-val"><span id="seconds">5</span> წამი</div>
            
            <div class="progress-container">
                <div class="progress-bar" id="bar"></div>
            </div>

            <a href="https://uunimed.github.io/exams" class="link-text">uunimed.github.io/exams</a>
        </div>

        <footer>წარმატებულ საგამოცდო პერიოდს გისურვებთ</footer>
    </div>

    <script>
        const targetURL = "https://uunimed.github.io/exams";
        let time = 5;
        const secondsEl = document.getElementById('seconds');
        const barEl = document.getElementById('bar');

        const timer = setInterval(() => {
            time--;
            if(secondsEl) secondsEl.innerText = time;
            if(barEl) barEl.style.width = ((5 - time) / 5 * 100) + "%";

            if (time <= 0) {
                clearInterval(timer);
                window.location.href = targetURL;
            }
        }, 1000);

        const canvas = document.getElementById('particle-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function initCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            particles = [];
            createParticles();
        }

        class Particle {
            constructor() {
                this.reset();
            }
            reset() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2 + 0.5;
                this.speedX = Math.random() * 0.4 - 0.2;
                this.speedY = Math.random() * 0.4 - 0.2;
                this.opacity = Math.random() * 0.5;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                if (this.x < 0 || this.x > canvas.width || this.y < 0 || this.y > canvas.height) {
                    this.reset();
                }
            }
            draw() {
                ctx.fillStyle = `rgba(52, 152, 219, ${this.opacity})`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function createParticles() {
            const count = window.innerWidth > 1000 ? 120 : 60;
            for (let i = 0; i < count; i++) {
                particles.push(new Particle());
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => {
                p.update();
                p.draw();
            });
            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', initCanvas);
        initCanvas();
        animate();
    </script>
</body>
</html>
