<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>advanced clock · ქართული</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            background-color: #0a0a1a; /* deep dark fallback */
            /* soft, fat, modern Georgian-friendly font stack */
            font-family: 'Segoe UI', 'Roboto', 'Noto Sans Georgian', 'Noto Sans', system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
            font-weight: 700; /* bold base, but we'll control per element */
        }

        /* canvas fills entire background, behind everything */
        #particle-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: block;
            z-index: 0;
            pointer-events: none;
        }

        /* clock container: full flex center, layered above canvas */
        .clock-wrapper {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
            color: white;
            text-shadow: 0 0 20px rgba(0, 160, 255, 0.7), 0 0 40px rgba(80, 100, 255, 0.5);
            padding: 1rem;
        }

        /* clock panel: NO background, just text and subtle shadow */
        .clock-panel {
            text-align: center;
            /* no background, no blur, no border — only text and its glow */
            background: transparent;
            backdrop-filter: none;
            -webkit-backdrop-filter: none;
            border: none;
            box-shadow: none;
            padding: 0; /* remove extra padding so time is pure */
            max-width: 95vw;
        }

        /* time in bold, soft and fat */
        .time {
            font-size: clamp(4.5rem, 22vw, 12rem);
            font-weight: 800; /* extra bold for fat look */
            letter-spacing: 2px;
            line-height: 1.1;
            font-variant-numeric: tabular-nums;
            color: #ffffff;
            text-shadow: 0 0 15px cyan, 0 0 45px #3a7eff;
            margin: 0;
            /* softness comes from the font itself and slight glow */
        }

        /* date row: month + year, also bold but a tad lighter */
        .date {
            font-size: clamp(2rem, 7vw, 4rem);
            font-weight: 700; /* bold, but not as heavy as time */
            letter-spacing: 2px;
            margin-top: 0.5rem;
            color: #e0f0ff;
            text-shadow: 0 0 15px #6a9eff, 0 0 30px #3a62c4;
            line-height: 1.3;
            border: none;    /* no extra line */
            padding: 0;
            display: block;   /* full width for block */
        }

        /* optional subtext — small and thin, but we remove background completely */
        .clock-panel sub {
            font-size: 1.1rem;
            font-weight: 400; /* light, to contrast with bold time */
            opacity: 0.7;
            display: block;
            margin-top: 1.2rem;
            letter-spacing: 2px;
            color: #b0d0ff;
            text-shadow: 0 0 8px #2f4faf;
            background: transparent;
        }

        /* all text elements have zero background */
        .time, .date, sub {
            background: transparent;
        }

        /* responsive adjustments */
        @media (max-width: 600px) {
            .time {
                font-size: clamp(3.8rem, 18vw, 8rem);
                letter-spacing: 1px;
            }
            .date {
                font-size: clamp(1.6rem, 6vw, 2.8rem);
                margin-top: 0.3rem;
            }
        }
    </style>
</head>
<body>
    <!-- canvas for particles (dark background + moving particles) -->
    <canvas id="particle-canvas"></canvas>

    <!-- clock overlay, centered, completely transparent background -->
    <div class="clock-wrapper">
        <div class="clock-panel">
            <!-- time in hh.mm.ss (წუთი & წამი are implied, but we keep format with dots) -->
            <div class="time" id="time">23.59.59</div>
            <!-- month year in Georgian: e.g. "მარტი 2026" (month + year)  -->
            <div class="date" id="date">მარტი 2026</div>
            <sub>· თბილისის დრო ·</sub>   <!-- "tbilisi time" in Georgian, adds local touch -->
        </div>
    </div>

    <script>
        (function() {
            "use strict";

            // ---------- PARTICLE BACKGROUND (dark, refined, no ugly effects) ----------
            const canvas = document.getElementById('particle-canvas');
            const ctx = canvas.getContext('2d');

            let width, height;
            let particles = [];

            const PARTICLE_COUNT = 150;        // sufficient density
            const MAX_RADIUS = 2.4;
            const MIN_RADIUS = 0.9;
            const CONNECT_DIST = 150;          // connection distance for subtle web

            function initParticles() {
                particles = [];
                for (let i = 0; i < PARTICLE_COUNT; i++) {
                    particles.push({
                        x: Math.random() * width,
                        y: Math.random() * height,
                        vx: (Math.random() - 0.5) * 0.35,
                        vy: (Math.random() - 0.5) * 0.25,
                        radius: Math.random() * (MAX_RADIUS - MIN_RADIUS) + MIN_RADIUS,
                        alphaBase: Math.random() * 0.5 + 0.3, // 0.3–0.8
                    });
                }
            }

            function resizeCanvas() {
                width = window.innerWidth;
                height = window.innerHeight;
                canvas.width = width;
                canvas.height = height;
                initParticles();
            }

            function drawParticles() {
                if (!ctx || width === 0 || height === 0) return;

                ctx.clearRect(0, 0, width, height);

                // deep dark gradient (very subtle)
                const gradient = ctx.createLinearGradient(0, 0, width*0.5, height);
                gradient.addColorStop(0, '#0b0e1a');
                gradient.addColorStop(1, '#12172f');
                ctx.fillStyle = gradient;
                ctx.fillRect(0, 0, width, height);

                // faint connections between nearby particles (ethereal)
                ctx.strokeStyle = 'rgba(90, 160, 255, 0.12)';
                ctx.lineWidth = 0.7;
                for (let i = 0; i < particles.length; i++) {
                    for (let j = i + 1; j < particles.length; j++) {
                        const dx = particles[i].x - particles[j].x;
                        const dy = particles[i].y - particles[j].y;
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        if (dist < CONNECT_DIST) {
                            const op = 0.18 * (1 - dist / CONNECT_DIST);
                            ctx.strokeStyle = `rgba(130, 190, 255, ${op})`;
                            ctx.beginPath();
                            ctx.moveTo(particles[i].x, particles[i].y);
                            ctx.lineTo(particles[j].x, particles[j].y);
                            ctx.stroke();
                        }
                    }
                }

                // draw particles: soft glowing dots
                for (let p of particles) {
                    // main glow (radial)
                    const grd = ctx.createRadialGradient(p.x, p.y, 0.3, p.x, p.y, p.radius * 3.5);
                    grd.addColorStop(0, `rgba(255, 255, 255, ${p.alphaBase + 0.2})`);
                    grd.addColorStop(0.6, `rgba(140, 200, 255, ${p.alphaBase * 0.7})`);
                    grd.addColorStop(1, `rgba(40, 100, 230, 0)`);

                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.radius * 2.0, 0, Math.PI * 2);
                    ctx.fillStyle = grd;
                    ctx.fill();

                    // tiny bright core
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.radius * 0.9, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(255, 255, 255, 0.9)`;
                    ctx.fill();
                }
            }

            function updateParticles() {
                for (let p of particles) {
                    p.x += p.vx;
                    p.y += p.vy;

                    // wrap around edges (infinite feel)
                    if (p.x < 0) p.x = width;
                    if (p.x > width) p.x = 0;
                    if (p.y < 0) p.y = height;
                    if (p.y > height) p.y = 0;

                    // occasional gentle drift
                    if (Math.random() < 0.006) {
                        p.vx += (Math.random() - 0.5) * 0.05;
                        p.vy += (Math.random() - 0.5) * 0.05;
                        const maxSpeed = 0.5;
                        if (Math.abs(p.vx) > maxSpeed) p.vx *= 0.96;
                        if (Math.abs(p.vy) > maxSpeed) p.vy *= 0.96;
                    }
                }
            }

            function animateParticles() {
                if (width !== window.innerWidth || height !== window.innerHeight) {
                    resizeCanvas();
                }
                updateParticles();
                drawParticles();
                requestAnimationFrame(animateParticles);
            }

            // start particles
            resizeCanvas();
            animateParticles();

            // ---------- ADVANCED CLOCK with Georgian month names ----------
            const timeEl = document.getElementById('time');
            const dateEl = document.getElementById('date');

            // full Georgian month names
            const monthNamesGE = [
                'იანვარი', 'თებერვალი', 'მარტი', 'აპრილი', 'მაისი', 'ივნისი',
                'ივლისი', 'აგვისტო', 'სექტემბერი', 'ოქტომბერი', 'ნოემბერი', 'დეკემბერი'
            ];

            function updateClock() {
                const now = new Date();

                // time in hh.mm.ss (24h format, with dots)
                const hours = String(now.getHours()).padStart(2, '0');
                const minutes = String(now.getMinutes()).padStart(2, '0');
                const seconds = String(now.getSeconds()).padStart(2, '0');
                const timeString = `${hours}.${minutes}.${seconds}`;

                // month and year (down month, year) in Georgian:
                // example: "მარტი 2026"  (no day number, just month + year as requested)
                const monthIndex = now.getMonth();
                const monthName = monthNamesGE[monthIndex];
                const year = now.getFullYear();
                const dateString = `${monthName} ${year}`;

                // update DOM
                timeEl.textContent = timeString;
                dateEl.textContent = dateString;
            }

            // initial update and set interval
            updateClock();
            setInterval(updateClock, 500); // smooth, but you can change to 1000 if preferred

            // ensure canvas resize doesn't affect clock
            window.addEventListener('resize', () => {});
        })();
    </script>
</body>
</html>
